<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 660 240" width="660" height="240">
  <defs>
    <filter id="gShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#8a6000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="660" height="240" rx="16" fill="#fff8e7"/>
  <rect width="660" height="240" rx="16" fill="none" stroke="#e8c84a" stroke-width="2"/>

  <!-- Title -->
  <text x="330" y="28" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="14" font-weight="900" fill="#3a2a00" letter-spacing="4">BATTLE GESTURES</text>

  <!-- Row 1 -->
  <g filter="url(#gShadow)">
    <rect x="15" y="45" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="15" y="45" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="40" y="95" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x270B;</text>
    <text x="115" y="72" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">RAISE</text>
    <text x="115" y="90" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Hand up signal</text>
    <text x="115" y="108" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">Accel Y+</text>
  </g>

  <g filter="url(#gShadow)">
    <rect x="230" y="45" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="230" y="45" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="255" y="95" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x1F44B;</text>
    <text x="330" y="72" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">SHAKE</text>
    <text x="330" y="90" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Rapid oscillation</text>
    <text x="330" y="108" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">High-freq X</text>
  </g>

  <g filter="url(#gShadow)">
    <rect x="445" y="45" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="445" y="45" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="470" y="95" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x1FA93;</text>
    <text x="545" y="72" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">CHOP</text>
    <text x="545" y="90" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Downward strike</text>
    <text x="545" y="108" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">Accel Z−</text>
  </g>

  <!-- Row 2 -->
  <g filter="url(#gShadow)">
    <rect x="15" y="145" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="15" y="145" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="40" y="195" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x1F300;</text>
    <text x="115" y="172" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">STIR</text>
    <text x="115" y="190" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Circular motion</text>
    <text x="115" y="208" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">Gyro XY loop</text>
  </g>

  <g filter="url(#gShadow)">
    <rect x="230" y="145" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="230" y="145" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="255" y="195" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x1F3CF;</text>
    <text x="330" y="172" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">SWING</text>
    <text x="330" y="190" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Wide arc sweep</text>
    <text x="330" y="208" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">Gyro Z peak</text>
  </g>

  <g filter="url(#gShadow)">
    <rect x="445" y="145" width="200" height="82" rx="12" fill="white" stroke="#cc3333" stroke-width="1.5"/>
    <rect x="445" y="145" width="50" height="82" rx="12" fill="#cc3333" fill-opacity="0.08"/>
    <text x="470" y="195" font-size="34" text-anchor="middle" font-family="'Segoe UI Emoji', 'Apple Color Emoji', sans-serif">&#x1F44A;</text>
    <text x="545" y="172" font-family="'Trebuchet MS', Arial, sans-serif" font-size="16" font-weight="800" fill="#cc3333">PUNCH</text>
    <text x="545" y="190" font-family="Arial, sans-serif" font-size="10" fill="#5a4020">Forward thrust</text>
    <text x="545" y="208" font-family="Arial, sans-serif" font-size="9" fill="#b8860b" font-weight="600">Accel X spike</text>
  </g>
</svg>