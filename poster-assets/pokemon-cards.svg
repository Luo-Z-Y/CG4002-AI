<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280">
  <defs>
    <filter id="cardShadow">
      <feDropShadow dx="1" dy="3" stdDeviation="5" flood-color="#8a6000" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="820" height="280" rx="16" fill="#fff8e7"/>
  <rect width="820" height="280" rx="16" fill="none" stroke="#e8c84a" stroke-width="2"/>

  <!-- ===== BULBASAUR ===== -->
  <g filter="url(#cardShadow)">
    <rect x="20" y="15" width="245" height="250" rx="16" fill="white" stroke="#48a868" stroke-width="2"/>
    <!-- Type banner -->
    <rect x="20" y="15" width="245" height="36" rx="16" fill="#48a868"/>
    <rect x="20" y="37" width="245" height="14" fill="#48a868"/>
    <text x="142" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="3">GRASS / POISON</text>

    <!-- Illustration area -->
    <circle cx="142" cy="120" r="45" fill="#48a868" opacity="0.08"/>
    <circle cx="142" cy="125" r="32" fill="#48a868" opacity="0.12"/>
    <!-- Body -->
    <ellipse cx="142" cy="135" rx="24" ry="20" fill="#68c888"/>
    <ellipse cx="142" cy="135" rx="24" ry="20" fill="none" stroke="#48a868" stroke-width="1.5"/>
    <!-- Spots -->
    <ellipse cx="129" cy="132" rx="5" ry="3.5" fill="#48a868" opacity="0.35"/>
    <ellipse cx="155" cy="138" rx="4" ry="3" fill="#48a868" opacity="0.35"/>
    <!-- Bulb -->
    <ellipse cx="142" cy="108" rx="18" ry="22" fill="#48a868"/>
    <ellipse cx="142" cy="103" rx="14" ry="17" fill="#58b878"/>
    <path d="M134,92 Q142,80 150,92" fill="#68c888" opacity="0.7"/>
    <!-- Legs -->
    <ellipse cx="126" cy="151" rx="7" ry="6" fill="#58b878"/>
    <ellipse cx="158" cy="151" rx="7" ry="6" fill="#58b878"/>
    <!-- Eyes -->
    <ellipse cx="134" cy="133" rx="4.5" ry="5" fill="white"/>
    <ellipse cx="150" cy="133" rx="4.5" ry="5" fill="white"/>
    <circle cx="135" cy="133" r="3" fill="#2a2a2a"/>
    <circle cx="151" cy="133" r="3" fill="#2a2a2a"/>
    <circle cx="136" cy="131.5" r="1.2" fill="white"/>
    <circle cx="152" cy="131.5" r="1.2" fill="white"/>
    <!-- Mouth -->
    <path d="M138,141 Q142,145 146,141" stroke="#48a868" stroke-width="1.2" fill="none"/>

    <!-- Name + label -->
    <text x="142" y="185" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="900" fill="#2a5a3a">BULBASAUR</text>
    <text x="142" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a7040">#001</text>

    <!-- Voice class bar -->
    <rect x="45" y="218" width="195" height="6" rx="3" fill="#e8e8e0"/>
    <rect x="45" y="218" width="130" height="6" rx="3" fill="#48a868"/>
    <text x="45" y="242" font-family="Arial, sans-serif" font-size="9" fill="#8a7040">VOICE MATCH</text>
    <text x="240" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#48a868" font-weight="800">CLASS 1</text>
  </g>

  <!-- ===== CHARIZARD ===== -->
  <g filter="url(#cardShadow)">
    <rect x="288" y="15" width="245" height="250" rx="16" fill="white" stroke="#cc3333" stroke-width="2"/>
    <rect x="288" y="15" width="245" height="36" rx="16" fill="#cc3333"/>
    <rect x="288" y="37" width="245" height="14" fill="#cc3333"/>
    <text x="410" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="white" letter-spacing="3">FIRE / FLYING</text>

    <circle cx="410" cy="120" r="45" fill="#cc3333" opacity="0.06"/>
    <circle cx="410" cy="125" r="32" fill="#cc3333" opacity="0.1"/>
    <!-- Wings -->
    <path d="M382,120 L355,82 L378,115" fill="#ff8855" opacity="0.6"/>
    <path d="M438,120 L465,82 L442,115" fill="#ff8855" opacity="0.6"/>
    <path d="M358,87 L366,98 L353,94" fill="#ffaa77" opacity="0.4"/>
    <path d="M462,87 L454,98 L467,94" fill="#ffaa77" opacity="0.4"/>
    <!-- Body -->
    <ellipse cx="410" cy="138" rx="22" ry="24" fill="#e84a30"/>
    <ellipse cx="410" cy="138" rx="22" ry="24" fill="none" stroke="#cc3333" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="410" cy="145" rx="13" ry="13" fill="#ffcc88" opacity="0.35"/>
    <!-- Head -->
    <circle cx="410" cy="110" r="16" fill="#e85a40"/>
    <!-- Horns -->
    <path d="M400,100 L395,84" stroke="#ff7755" stroke-width="3" stroke-linecap="round"/>
    <path d="M420,100 L425,84" stroke="#ff7755" stroke-width="3" stroke-linecap="round"/>
    <!-- Eyes -->
    <ellipse cx="404" cy="109" rx="4" ry="4.5" fill="white"/>
    <ellipse cx="416" cy="109" rx="4" ry="4.5" fill="white"/>
    <circle cx="405" cy="109" r="2.5" fill="#2a2a2a"/>
    <circle cx="417" cy="109" r="2.5" fill="#2a2a2a"/>
    <circle cx="406" cy="107.5" r="1" fill="white"/>
    <circle cx="418" cy="107.5" r="1" fill="white"/>
    <!-- Mouth -->
    <path d="M404,116 Q410,120 416,116" stroke="#cc3333" stroke-width="1.2" fill="none"/>
    <!-- Flame tail -->
    <path d="M410,162 Q404,178 396,185 Q406,176 410,162" fill="#ffcb05"/>
    <path d="M410,162 Q416,178 424,185 Q414,176 410,162" fill="#ff8800"/>

    <text x="410" y="185" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="900" fill="#8a2020">CHARIZARD</text>
    <text x="410" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a7040">#006</text>

    <rect x="313" y="218" width="195" height="6" rx="3" fill="#e8e8e0"/>
    <rect x="313" y="218" width="150" height="6" rx="3" fill="#cc3333"/>
    <text x="313" y="242" font-family="Arial, sans-serif" font-size="9" fill="#8a7040">VOICE MATCH</text>
    <text x="508" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#cc3333" font-weight="800">CLASS 2</text>
  </g>

  <!-- ===== PIKACHU ===== -->
  <g filter="url(#cardShadow)">
    <rect x="556" y="15" width="245" height="250" rx="16" fill="white" stroke="#d4a800" stroke-width="2"/>
    <rect x="556" y="15" width="245" height="36" rx="16" fill="#ffcb05"/>
    <rect x="556" y="37" width="245" height="14" fill="#ffcb05"/>
    <text x="678" y="40" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="700" fill="#3a2a00" letter-spacing="3">ELECTRIC</text>

    <circle cx="678" cy="120" r="45" fill="#ffcb05" opacity="0.08"/>
    <circle cx="678" cy="125" r="32" fill="#ffcb05" opacity="0.12"/>
    <!-- Ears -->
    <path d="M656,113 L644,70 L664,108" fill="#ffcb05"/>
    <path d="M644,70 L649,84 L653,76" fill="#2a2a2a"/>
    <path d="M700,113 L712,70 L692,108" fill="#ffcb05"/>
    <path d="M712,70 L707,84 L703,76" fill="#2a2a2a"/>
    <!-- Body -->
    <ellipse cx="678" cy="138" rx="24" ry="22" fill="#ffcb05"/>
    <ellipse cx="678" cy="138" rx="24" ry="22" fill="none" stroke="#d4a800" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="678" cy="144" rx="14" ry="12" fill="#ffe566" opacity="0.5"/>
    <!-- Cheeks -->
    <circle cx="656" cy="132" r="8" fill="#ff6b6b" opacity="0.4"/>
    <circle cx="700" cy="132" r="8" fill="#ff6b6b" opacity="0.4"/>
    <!-- Eyes -->
    <ellipse cx="670" cy="127" rx="5" ry="6" fill="#2a2a2a"/>
    <ellipse cx="686" cy="127" rx="5" ry="6" fill="#2a2a2a"/>
    <circle cx="671.5" cy="125" r="2" fill="white"/>
    <circle cx="687.5" cy="125" r="2" fill="white"/>
    <!-- Nose -->
    <circle cx="678" cy="131" r="1.2" fill="#2a2a2a"/>
    <!-- Mouth -->
    <path d="M673,135 Q678,139 683,135" stroke="#a07000" stroke-width="1" fill="none"/>
    <!-- Lightning tail -->
    <path d="M702,138 L720,124 L713,138 L728,130 L716,148 L709,140 L702,148" fill="#ffcb05" stroke="#d4a800" stroke-width="1"/>

    <text x="678" y="185" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="22" font-weight="900" fill="#6a5000">PIKACHU</text>
    <text x="678" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#8a7040">#025</text>

    <rect x="581" y="218" width="195" height="6" rx="3" fill="#e8e8e0"/>
    <rect x="581" y="218" width="170" height="6" rx="3" fill="#d4a800"/>
    <text x="581" y="242" font-family="Arial, sans-serif" font-size="9" fill="#8a7040">VOICE MATCH</text>
    <text x="776" y="242" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="#d4a800" font-weight="800">CLASS 3</text>
  </g>
</svg>