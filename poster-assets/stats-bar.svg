<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 90" width="700" height="90">
  <rect width="700" height="90" rx="14" fill="#fff8e7" stroke="#e8c84a" stroke-width="2"/>

  <!-- 6 Gestures -->
  <text x="90" y="40" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="34" font-weight="900" fill="#cc3333">6</text>
  <text x="90" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a4020" letter-spacing="2" font-weight="600">GESTURES</text>

  <line x1="175" y1="18" x2="175" y2="72" stroke="#e8c84a" stroke-width="1.5"/>

  <!-- 3 Voices -->
  <text x="260" y="40" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="34" font-weight="900" fill="#cc3333">3</text>
  <text x="260" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a4020" letter-spacing="2" font-weight="600">VOICES</text>

  <line x1="345" y1="18" x2="345" y2="72" stroke="#e8c84a" stroke-width="1.5"/>

  <!-- Q8.8 -->
  <text x="435" y="40" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="30" font-weight="900" fill="#cc3333">Q8.8</text>
  <text x="435" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a4020" letter-spacing="2" font-weight="600">QUANTISATION</text>

  <line x1="525" y1="18" x2="525" y2="72" stroke="#e8c84a" stroke-width="1.5"/>

  <!-- 600 Samples -->
  <text x="612" y="40" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="34" font-weight="900" fill="#cc3333">600</text>
  <text x="612" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#5a4020" letter-spacing="2" font-weight="600">SAMPLES</text>
</svg>