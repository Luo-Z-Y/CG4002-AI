<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 500" width="1100" height="500">
  <defs>
    <filter id="shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#b8860b" flood-opacity="0.2"/>
    </filter>
    <marker id="arrowBlk" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5a4020"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#cc3333"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b8860b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="500" rx="16" fill="#fff8e7"/>
  <rect width="1100" height="500" rx="16" fill="none" stroke="#e8c84a" stroke-width="3"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="1100" height="44" rx="16" fill="#ffcb05"/>
  <rect x="0" y="20" width="1100" height="24" fill="#ffcb05"/>
  <text x="550" y="30" text-anchor="middle" font-family="'Trebuchet MS', Arial, sans-serif" font-size="18" font-weight="900" fill="#3a2a00" letter-spacing="4">AI SYSTEM ARCHITECTURE</text>

  <!-- ===== COL 1: SENSORS ===== -->
  <g filter="url(#shadow)">
    <rect x="25" y="70" width="155" height="95" rx="12" fill="white" stroke="#e8c84a" stroke-width="2"/>
    <rect x="25" y="70" width="155" height="30" rx="12" fill="#ffcb05"/>
    <rect x="25" y="88" width="155" height="12" fill="#ffcb05"/>
    <text x="102" y="91" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#3a2a00" letter-spacing="1">IMU SENSOR</text>
    <text x="102" y="118" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Gyroscope + Accel</text>
    <text x="102" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8a7040">6-axis · 60 samples</text>
    <text x="102" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b8960b" font-weight="600">100 Hz polling</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="25" y="185" width="155" height="95" rx="12" fill="white" stroke="#e8c84a" stroke-width="2"/>
    <rect x="25" y="185" width="155" height="30" rx="12" fill="#ffcb05"/>
    <rect x="25" y="203" width="155" height="12" fill="#ffcb05"/>
    <text x="102" y="206" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#3a2a00" letter-spacing="1">MICROPHONE</text>
    <text x="102" y="233" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Audio Capture</text>
    <text x="102" y="251" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8a7040">WAV · 16 kHz</text>
    <text x="102" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b8960b" font-weight="600">Voice commands</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="25" y="300" width="155" height="80" rx="12" fill="white" stroke="#e8c84a" stroke-width="2"/>
    <rect x="25" y="300" width="155" height="30" rx="12" fill="#ffcb05"/>
    <rect x="25" y="318" width="155" height="12" fill="#ffcb05"/>
    <text x="102" y="321" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="#3a2a00" letter-spacing="1">ESP32</text>
    <text x="102" y="349" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">BLE / WiFi Bridge</text>
    <text x="102" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#b8960b" font-weight="600">Wireless relay</text>
  </g>

  <!-- Arrows: Sensors → MQTT -->
  <line x1="180" y1="118" x2="230" y2="200" stroke="#5a4020" stroke-width="2" marker-end="url(#arrowBlk)"/>
  <line x1="180" y1="232" x2="230" y2="220" stroke="#5a4020" stroke-width="2" marker-end="url(#arrowBlk)"/>
  <line x1="180" y1="340" x2="230" y2="240" stroke="#5a4020" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- ===== COL 2: MQTT ===== -->
  <g filter="url(#shadow)">
    <rect x="235" y="170" width="150" height="105" rx="12" fill="white" stroke="#cc3333" stroke-width="2"/>
    <rect x="235" y="170" width="150" height="30" rx="12" fill="#cc3333"/>
    <rect x="235" y="188" width="150" height="12" fill="#cc3333"/>
    <text x="310" y="191" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="800" fill="white" letter-spacing="1">MQTT BROKER</text>
    <text x="310" y="218" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Pub / Sub</text>
    <text x="310" y="236" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Topic Routing</text>
    <text x="310" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#8a7040">IMU + Audio topics</text>
    <text x="310" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#cc3333" font-weight="600">Amazon EC2</text>
  </g>

  <!-- Arrows: MQTT → Preprocess (split) -->
  <path d="M 385,200 L 430,145" stroke="#cc3333" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>
  <path d="M 385,245 L 430,290" stroke="#cc3333" stroke-width="2" fill="none" marker-end="url(#arrowRed)"/>

  <!-- ===== COL 3: PREPROCESSING (two paths) ===== -->
  <!-- Gesture -->
  <g filter="url(#shadow)">
    <rect x="430" y="80" width="170" height="125" rx="12" fill="white" stroke="#e8c84a" stroke-width="2"/>
    <rect x="430" y="80" width="170" height="30" rx="12" fill="#ffcb05"/>
    <rect x="430" y="98" width="170" height="12" fill="#ffcb05"/>
    <text x="515" y="101" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00" letter-spacing="1">GESTURE PREPROC</text>
    <text x="515" y="128" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Idle Trimming</text>
    <text x="515" y="146" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Baseline Removal</text>
    <text x="515" y="164" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">FFT Resampling</text>
    <rect x="460" y="175" width="110" height="20" rx="6" fill="#fff3cc" stroke="#e8c84a" stroke-width="1"/>
    <text x="515" y="189" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#8a6000">60 × 6 tensor</text>
  </g>

  <!-- Voice -->
  <g filter="url(#shadow)">
    <rect x="430" y="235" width="170" height="145" rx="12" fill="white" stroke="#e8c84a" stroke-width="2"/>
    <rect x="430" y="235" width="170" height="30" rx="12" fill="#ffcb05"/>
    <rect x="430" y="253" width="170" height="12" fill="#ffcb05"/>
    <text x="515" y="256" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00" letter-spacing="1">VOICE PREPROC</text>
    <text x="515" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Silence Trimming</text>
    <text x="515" y="301" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Loudness Norm</text>
    <text x="515" y="319" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">MFCC Extraction</text>
    <text x="515" y="337" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Mean / Std Norm</text>
    <rect x="460" y="348" width="110" height="20" rx="6" fill="#fff3cc" stroke="#e8c84a" stroke-width="1"/>
    <text x="515" y="362" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" font-weight="700" fill="#8a6000">40 × 50 tensor</text>
  </g>

  <!-- Arrows: Preprocess → CNN -->
  <line x1="600" y1="145" x2="650" y2="195" stroke="#5a4020" stroke-width="2" marker-end="url(#arrowBlk)"/>
  <line x1="600" y1="310" x2="650" y2="250" stroke="#5a4020" stroke-width="2" marker-end="url(#arrowBlk)"/>

  <!-- ===== COL 4: DUAL CNN ===== -->
  <g filter="url(#shadow)">
    <rect x="650" y="155" width="155" height="140" rx="12" fill="white" stroke="#cc3333" stroke-width="2.5"/>
    <rect x="650" y="155" width="155" height="30" rx="12" fill="#cc3333"/>
    <rect x="650" y="173" width="155" height="12" fill="#cc3333"/>
    <text x="727" y="176" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="white" letter-spacing="1">DUAL CNN</text>
    <text x="727" y="205" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Conv1d → MaxPool</text>
    <text x="727" y="223" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Conv1d → MaxPool</text>
    <text x="727" y="241" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Dense → Dense</text>
    <rect x="672" y="255" width="110" height="28" rx="8" fill="#cc3333" fill-opacity="0.1" stroke="#cc3333" stroke-width="1"/>
    <text x="727" y="274" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" font-weight="800" fill="#cc3333">Q8.8 Fixed-Pt</text>
    <text x="727" y="290" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8a7040">HLS-synthesised C++</text>
  </g>

  <!-- Arrow: CNN → FPGA -->
  <line x1="805" y1="225" x2="850" y2="225" stroke="#cc3333" stroke-width="2.5" marker-end="url(#arrowRed)"/>

  <!-- ===== COL 5: ULTRA96 FPGA ===== -->
  <g filter="url(#shadow)">
    <rect x="855" y="135" width="170" height="180" rx="12" fill="white" stroke="#b8860b" stroke-width="3"/>
    <rect x="855" y="135" width="170" height="32" rx="12" fill="#ffcb05"/>
    <rect x="855" y="155" width="170" height="12" fill="#ffcb05"/>
    <!-- Pokeball accent -->
    <circle cx="880" cy="152" r="8" fill="none" stroke="#3a2a00" stroke-width="1.5" opacity="0.3"/>
    <line x1="872" y1="152" x2="888" y2="152" stroke="#3a2a00" stroke-width="1.5" opacity="0.3"/>
    <circle cx="880" cy="152" r="3" fill="none" stroke="#3a2a00" stroke-width="1.5" opacity="0.3"/>
    <text x="950" y="156" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" font-weight="900" fill="#3a2a00" letter-spacing="1">ULTRA96 FPGA</text>
    <text x="940" y="186" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">PYNQ Overlay</text>
    <text x="940" y="204" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">DMA Transfer</text>
    <text x="940" y="222" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">HLS IP Cores</text>
    <rect x="878" y="235" width="124" height="32" rx="8" fill="#ffcb05" fill-opacity="0.3" stroke="#b8860b" stroke-width="1.5"/>
    <text x="940" y="248" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00">REAL-TIME</text>
    <text x="940" y="262" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00">EDGE INFERENCE</text>
    <text x="940" y="285" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#b8860b">dual_cnn.xsa</text>
    <text x="940" y="305" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#8a7040">Xilinx Zynq UltraScale+</text>
  </g>

  <!-- Arrows FPGA → Outputs -->
  <path d="M 940,315 L 870,380" stroke="#b8860b" stroke-width="2" fill="none" marker-end="url(#arrowGold)"/>
  <path d="M 940,315 L 1010,380" stroke="#b8860b" stroke-width="2" fill="none" marker-end="url(#arrowGold)"/>

  <!-- ===== OUTPUTS ===== -->
  <!-- Gesture Output -->
  <g filter="url(#shadow)">
    <rect x="755" y="385" width="190" height="95" rx="12" fill="white" stroke="#cc3333" stroke-width="2"/>
    <rect x="755" y="385" width="190" height="28" rx="12" fill="#cc3333"/>
    <rect x="755" y="401" width="190" height="12" fill="#cc3333"/>
    <text x="850" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="white" letter-spacing="1">GESTURE OUTPUT</text>
    <text x="850" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a4020" font-weight="600">Raise · Shake · Chop</text>
    <text x="850" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#5a4020" font-weight="600">Stir · Swing · Punch</text>
    <text x="850" y="472" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" fill="#cc3333" font-weight="700">6 battle moves</text>
  </g>

  <!-- Voice Output -->
  <g filter="url(#shadow)">
    <rect x="960" y="385" width="120" height="95" rx="12" fill="white" stroke="#cc3333" stroke-width="2"/>
    <rect x="960" y="385" width="120" height="28" rx="12" fill="#cc3333"/>
    <rect x="960" y="401" width="120" height="12" fill="#cc3333"/>
    <text x="1020" y="404" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="white" letter-spacing="1">VOICE OUTPUT</text>
    <text x="1020" y="432" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Bulbasaur</text>
    <text x="1020" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Charizard</text>
    <text x="1020" y="468" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Pikachu</text>
  </g>

  <!-- ===== TRAINING PIPELINE (bottom-left) ===== -->
  <g filter="url(#shadow)">
    <rect x="25" y="405" width="340" height="75" rx="12" fill="#fff3cc" stroke="#e8c84a" stroke-width="1.5"/>
    <text x="195" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00" letter-spacing="2">TRAINING PIPELINE (OFFLINE)</text>
    <text x="195" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">PyTorch (macOS) → Weight Export → Vitis HLS (Win)</text>
    <text x="195" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">→ Synthesise .xsa overlay → Deploy to Ultra96</text>
  </g>

  <!-- Dashed arrow from training to FPGA -->
  <path d="M 365,430 Q 600,400 855,280" stroke="#b8860b" stroke-width="1.5" stroke-dasharray="6,4" fill="none" opacity="0.4" marker-end="url(#arrowGold)"/>

  <!-- Dashboard -->
  <g filter="url(#shadow)">
    <rect x="385" y="405" width="340" height="75" rx="12" fill="#fff3cc" stroke="#e8c84a" stroke-width="1.5"/>
    <text x="555" y="428" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="800" fill="#3a2a00" letter-spacing="2">LOCAL DASHBOARD</text>
    <text x="555" y="448" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Flask Server · Browser UI · Live Inference</text>
    <text x="555" y="466" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#5a4020">Waveform Plots · MFCC Visualisation</text>
  </g>
</svg>